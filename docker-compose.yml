services:
  stock-viewer:
    build:
      context: .
      args:
        VITE_AUTH_API_BASE: ${VITE_AUTH_API_BASE:-}
        VITE_STOCK_API_BASE: ${VITE_STOCK_API_BASE:-}
    container_name: stock-viewer
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=gateway-network"
      - "traefik.http.routers.stock-viewer.rule=Host(`stock.wkaiys.top`)"
      - "traefik.http.routers.stock-viewer.entrypoints=websecure"
      - "traefik.http.routers.stock-viewer.tls.certresolver=myresolver"
      - "traefik.http.services.stock-viewer.loadbalancer.server.port=3001"
      - "traefik.http.routers.stock-viewer-http.rule=Host(`stock.wkaiys.top`)"
      - "traefik.http.routers.stock-viewer-http.entrypoints=web"
      - "traefik.http.routers.stock-viewer-http.middlewares=stock-viewer-redirect"
      - "traefik.http.middlewares.stock-viewer-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.stock-viewer-redirect.redirectscheme.permanent=true"
    networks:
      - infra-network
      - gateway-network

networks:
  infra-network:
    external: true
  gateway-network:
    external: true
